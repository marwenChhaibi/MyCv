trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  DEPLOY_DIR: '/opt/mycv'
  FRONTEND_PORT: '8098'
  # ── Secret pipeline variables (Azure DevOps → Pipelines → Edit → Variables) ──
  # POSTGRES_PASSWORD : database password (required)
  # URFFILES_API_KEY  : UrfFiles API key (optional)

stages:
  # ─── Stage 1: Build .NET API + Vue frontend ───────────────────────────────────
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: BuildJob
        displayName: 'dotnet publish + npm build'
        steps:
          - task: UseDotNet@2
            displayName: 'Use .NET 10 SDK'
            inputs:
              packageType: 'sdk'
              version: '10.0.x'

          - script: |
              dotnet restore backend/MyCv.API/MyCv.API.csproj
              dotnet publish backend/MyCv.API/MyCv.API.csproj \
                -c Release \
                -o $(Build.ArtifactStagingDirectory)/publish \
                --no-restore
            displayName: 'dotnet publish'

          - task: UseNode@1
            displayName: 'Use Node 22'
            inputs:
              version: '22.x'

          - script: |
              cd frontend
              npm ci
              VITE_IDENTITY_URL=https://urfidentity.xyz npm run build
            displayName: 'npm build frontend'

          - task: CopyFiles@2
            displayName: 'Stage deploy files'
            inputs:
              contents: |
                backend/Dockerfile.deploy
                frontend/Dockerfile.deploy
                frontend/nginx.conf
                frontend/dist/**
                docker-compose.prod.yml
                nginx/marwenchhaibi.conf
              targetFolder: '$(Build.ArtifactStagingDirectory)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: 'mycv-artifacts'

  # ─── Stage 2: Deploy to production server ─────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to 87.106.6.140'
        environment: 'mycv-production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: 'Download artifacts'
                  inputs:
                    artifact: 'mycv-artifacts'
                    path: '$(Pipeline.Workspace)/artifacts'

                - task: CopyFilesOverSSH@0
                  displayName: 'Upload artifacts to server'
                  inputs:
                    sshEndpoint: 'ProductionSSH'
                    sourceFolder: '$(Pipeline.Workspace)/artifacts'
                    contents: '**'
                    targetFolder: '$(DEPLOY_DIR)/incoming'
                    cleanTargetFolder: true

                - task: Bash@3
                  displayName: 'Generate .env from pipeline secrets'
                  env:
                    POSTGRES_PASSWORD: $(POSTGRES_PASSWORD)
                    URFFILES_API_KEY: $(URFFILES_API_KEY)
                  inputs:
                    targetType: inline
                    script: |
                      set -e
                      is_real() { [ -n "$1" ] && ! echo "$1" | grep -q '^\$('; }

                      if ! is_real "$POSTGRES_PASSWORD"; then
                        echo "##[warning]POSTGRES_PASSWORD not configured — skipping .env generation."
                        echo "##vso[task.setvariable variable=skipEnvUpload]true"
                        exit 0
                      fi

                      cat > "$(Agent.TempDirectory)/.env" <<EOF
                      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
                      URFFILES_API_KEY=${URFFILES_API_KEY:-}
                      EOF
                      sed -i 's/^[[:space:]]*//' "$(Agent.TempDirectory)/.env"
                      echo ".env written"

                - task: CopyFilesOverSSH@0
                  displayName: 'Upload .env to server'
                  condition: ne(variables['skipEnvUpload'], 'true')
                  inputs:
                    sshEndpoint: 'ProductionSSH'
                    sourceFolder: '$(Agent.TempDirectory)'
                    contents: '.env'
                    targetFolder: '$(DEPLOY_DIR)'

                - task: SSH@0
                  displayName: 'Build images and deploy'
                  inputs:
                    sshEndpoint: 'ProductionSSH'
                    runOptions: 'inline'
                    inline: |
                      set -e

                      echo "=== Ensure deploy directory ==="
                      mkdir -p $(DEPLOY_DIR)
                      if [ ! -f $(DEPLOY_DIR)/.env ]; then
                        echo "POSTGRES_PASSWORD=mycv_secret" > $(DEPLOY_DIR)/.env
                        echo "##[warning]Created seed .env with default password. Set POSTGRES_PASSWORD in pipeline variables."
                      fi
                      chmod 600 $(DEPLOY_DIR)/.env

                      echo "=== Building API image (pre-compiled binary) ==="
                      docker build \
                        -f $(DEPLOY_DIR)/incoming/backend/Dockerfile.deploy \
                        -t mycv-api:latest \
                        $(DEPLOY_DIR)/incoming

                      echo "=== Building frontend image (pre-built dist) ==="
                      docker build \
                        -f $(DEPLOY_DIR)/incoming/frontend/Dockerfile.deploy \
                        -t mycv-frontend:latest \
                        $(DEPLOY_DIR)/incoming/frontend

                      echo "=== Stopping existing containers ==="
                      cd $(DEPLOY_DIR)
                      docker-compose -f docker-compose.prod.yml down 2>&1 || true

                      echo "=== Force-releasing port $(FRONTEND_PORT) if occupied ==="
                      cid=$(docker ps -q --filter "publish=$(FRONTEND_PORT)")
                      if [ -n "$cid" ]; then
                        echo "Killing container on port $(FRONTEND_PORT): $cid"
                        docker rm -f "$cid" || true
                      fi

                      echo "=== Updating docker-compose ==="
                      cp $(DEPLOY_DIR)/incoming/docker-compose.prod.yml $(DEPLOY_DIR)/docker-compose.prod.yml

                      echo "=== Starting database ==="
                      cd $(DEPLOY_DIR)
                      docker-compose -f docker-compose.prod.yml --env-file .env up -d db 2>&1

                      echo "=== Waiting for postgres (up to 60s) ==="
                      for i in $(seq 1 12); do
                        DB_CID=$(docker-compose -f docker-compose.prod.yml ps -q db 2>/dev/null)
                        if [ -n "$DB_CID" ] && docker exec "$DB_CID" pg_isready -U mycv > /dev/null 2>&1; then
                          echo "Postgres ready after $((i * 5))s"
                          break
                        fi
                        if [ "$i" -eq 12 ]; then
                          echo "##[error]Postgres did not become ready within 60s"
                          docker-compose -f docker-compose.prod.yml logs --tail=30 db
                          exit 1
                        fi
                        sleep 5
                      done

                      echo "=== Starting all containers ==="
                      docker-compose -f docker-compose.prod.yml --env-file .env up --force-recreate --remove-orphans -d 2>&1

                      echo "=== Health check (max 5 min) ==="
                      for i in $(seq 1 30); do
                        if curl -sf http://localhost:$(FRONTEND_PORT)/api/health > /dev/null 2>&1; then
                          echo "MyCv healthy after $i attempt(s)."
                          break
                        fi
                        if [ "$i" -eq 30 ]; then
                          echo "##[error]MyCv did not become healthy within 5 minutes."
                          docker-compose -f docker-compose.prod.yml ps
                          docker-compose -f docker-compose.prod.yml logs --tail=50 api
                          exit 1
                        fi
                        echo "Attempt $i/30 — retrying in 10s..."
                        sleep 10
                      done

                      echo "=== Cleanup ==="
                      rm -rf $(DEPLOY_DIR)/incoming
                      docker image prune -f
                      echo "=== Deployment complete ==="

                - task: CopyFilesOverSSH@0
                  displayName: 'Deploy nginx config'
                  inputs:
                    sshEndpoint: 'ProductionSSH'
                    sourceFolder: '$(Pipeline.Workspace)/artifacts/nginx'
                    contents: 'marwenchhaibi.conf'
                    targetFolder: '/etc/nginx/sites-available'

                - task: SSH@0
                  displayName: 'Reload nginx'
                  inputs:
                    sshEndpoint: 'ProductionSSH'
                    runOptions: 'inline'
                    failOnStdErr: false
                    inline: |
                      set -e
                      ln -sf /etc/nginx/sites-available/marwenchhaibi.conf /etc/nginx/sites-enabled/marwenchhaibi
                      nginx -t 2>&1 && systemctl reload nginx 2>&1

                - task: SSH@0
                  displayName: 'Ensure HTTPS (certbot)'
                  inputs:
                    sshEndpoint: 'ProductionSSH'
                    runOptions: 'inline'
                    failOnStdErr: false
                    inline: |
                      command -v certbot || apt-get install -y -qq certbot python3-certbot-nginx
                      flock -w 300 /tmp/certbot.lock \
                        certbot --nginx \
                          -d marwenchhaibi.urfidentity.xyz \
                          --non-interactive --agree-tos \
                          --email marwen.chhaibi.95@gmail.com \
                          --keep-until-expiring \
                          --redirect
                      systemctl reload nginx
