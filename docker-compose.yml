services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mycv
      POSTGRES_USER: mycv
      POSTGRES_PASSWORD: mycv_secret
    ports:
      - "5437:5432"
    volumes:
      - mycv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycv"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=mycv;Username=mycv;Password=mycv_secret"
      Identity__MetadataAddress: "http://host.docker.internal:8085/.well-known/openid-configuration"
      UrfFiles__BaseUrl: "http://host.docker.internal:8095"
      UrfFiles__ApiKey: ""
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3010:80"
    depends_on:
      - api

volumes:
  mycv_pgdata:
